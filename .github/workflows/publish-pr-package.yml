name: Publish PR package

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: "@tscircuit"

      - name: Setup bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.1

      - name: Install dependencies
        run: bun install

      - run: bun run build

      - name: Set PR version
        run: |
          npm version "0.0.0-pr.${{ github.event.pull_request.number }}.${{ github.run_number }}" --no-git-tag-version

      - name: Publish to GitHub Packages
        run: npm publish --tag "pr-${{ github.event.pull_request.number }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.TSCIRCUIT_BOT_GITHUB_TOKEN }}