ata-type="line" data-label="" points="293.20471582299564,172.12946711259758 293.20471582299564,143.44401321676156" fill="none" stroke="rgba(255,0,0,0.5)" stroke-width="9.6"/></g><g><polyline data-points="4.706323684734307,7.758687293488101 3.4650109782224074,9" data-type="line" data-label="" points="293.20471582299564,143.44401321676156 213.76070260623408,64" fill="none" stroke="rgba(255,0,0,0.5)" stroke-width="9.6"/></g><g><polyline data-points="3.4650109782224074,9 1,9" data-type="line" data-label="" points="213.76070260623408,64 56,64" fill="none" stroke="rgba(255,0,0,0.5)" stroke-width="9.6"/></g><g><polyline data-points="9,9 9,8.532945043307766" data-type="line" data-label="" points="568,64 568,93.89151722830297" fill="none" stroke="rgba(255,0,0,0.5)" stroke-width="9.6"/></g><g><polyline data-points="9,8.532945043307766 9.2,8.332945043307767" data-type="line" data-label="" points="568,93.89151722830297 580.8,106.69151722830293" fill="none" stroke="rgba(255,0,0,0.5)" stroke-width="9.6"/></g><g><polyline data-points="9.2,8.332945043307767 9.2,8.250000000000002" data-type="line" data-label="" points="580.8,106.69151722830293 580.8,111.99999999999989" fill="none" stroke="rgba(255,0,0,0.5)" stroke-width="9.6"/></g><g><polyline data-points="9.2,8.250000000000002 4.941652776895419,8.250000000000002" data-type="line" data-label="" points="580.8,111.99999999999989 308.2657777213068,111.99999999999989" fill="none" stroke="rgba(0,0,255,0.5)" stroke-width="9.6"/></g><g><polyline data-points="4.941652776895419,8.250000000000002 4.23040106052919,7.538748283633773" data-type="line" data-label="" points="308.2657777213068,111.99999999999989 262.7456678738682,157.5201098474385" fill="none" stroke="rgba(0,0,255,0.5)" stroke-width="9.6"/></g><g><polyline data-points="4.23040106052919,7.538748283633773 4.208333333333333,7.530555555555556" data-type="line" data-label="" points="262.7456678738682,157.5201098474385 261.3333333333333,158.04444444444442" fill="none" stroke="rgba(0,0,255,0.5)" stroke-width="9.6"/></g><g><polyline data-points="4.208333333333333,7.530555555555556 3.9814717477763404,7.530555555555556" data-type="line" data-label="" points="261.3333333333333,158.04444444444442 246.81419185768578,158.04444444444442" fill="none" stroke="rgba(255,0,0,0.5)" stroke-width="9.6"/></g><g><polyline data-points="3.9814717477763404,7.530555555555556 1,4.5490838077792155" data-type="line" data-label="" points="246.81419185768578,158.04444444444442 56,348.8586363021302" fill="none" stroke="rgba(255,0,0,0.5)" stroke-width="9.6"/></g><g><polyline data-points="1,4.5490838077792155 1,1" data-type="line" data-label="" points="56,348.8586363021302 56,576" fill="none" stroke="rgba(255,0,0,0.5)" stroke-width="9.6"/></g><g><polyline data-points="1,1 1,1" data-type="line" data-label="" points="56,576 56,576" fill="none" stroke="rgba(255,0,0,0.5)" stroke-width="9.6"/></g><g><rect data-type="rect" data-label="" data-x="5" data-y="5" x="248" y="256" width="128" height="128" fill="rgba(255,0,0,0.5)" stroke="black" stroke-width="0.015625"/></g><g><rect data-type="rect" data-label="" data-x="1" data-y="1" x="40" y="560" width="32" height="32" fill="rgba(255,0,0,0.5)" stroke="black" stroke-width="0.015625"/></g><g><rect data-type="rect" data-label="" data-x="9" data-y="9" x="552" y="48" width="32" height="32" fill="rgba(255,0,0,0.5)" stroke="black" stroke-width="0.015625"/></g><g><rect data-type="rect" data-label="" data-x="1" data-y="9" x="40" y="48" width="32" height="32" fill="rgba(255,0,0,0.5)" stroke="black" stroke-width="0.015625"/></g><g><rect data-type="rect" data-label="" data-x="9" data-y="1" x="552" y="560" width="32" height="32" fill="rgba(255,0,0,0.5)" stroke="black" stroke-width="0.015625"/></g><g><rect data-type="rect" data-label="" data-x="4" data-y="1" x="232" y="560" width="32" height="32" fill="rgba(255,0,0,0.5)" stroke="black" stroke-width="0.015625"/></g><circle data-type="circle" data-label="" data-x="9.2" data-y="8.250000000000002" cx="580.8" cy="111.99999999999989" r="19.2" fill="blue" stroke="none" stroke-width="0.015625"/><circle data-type="circle" data-label="" data-x="4.208333333333333" data-y="7.530555555555556" cx="261.3333333333333" cy="158.04444444444442" r="19.2" fill="blue" stroke="none" stroke-width="0.015625"/><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":64,"c":0,"e":-8,"b":0,"d":-64,"f":640};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>