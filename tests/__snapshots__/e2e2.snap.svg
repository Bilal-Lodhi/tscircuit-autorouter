59,200.3333251637822 405.74518790151825,378.1175490269698" fill="none" stroke="rgba(255,0,0,0.5)" stroke-width="9.88235294117647"/></g><g><polyline data-points="6.301489459219473,4.117858630840637 6.15,4" data-type="line" data-label="" points="405.74518790151825,378.1175490269698 395.764705882353,385.88235294117646" fill="none" stroke="rgba(255,0,0,0.5)" stroke-width="9.88235294117647"/></g><g><polyline data-points="6.15,4 5.800000000000001,3.5999999999999996" data-type="line" data-label="" points="395.764705882353,385.88235294117646 372.7058823529412,412.2352941176471" fill="none" stroke="rgba(255,0,0,0.5)" stroke-width="9.88235294117647"/></g><g><polyline data-points="5.800000000000001,3.5999999999999996 5.947640350342446,3.7687318289627956" data-type="line" data-label="" points="372.7058823529412,412.2352941176471 382.43277602256114,401.1188442095099" fill="none" stroke="rgba(255,0,0,0.5)" stroke-width="9.88235294117647"/></g><g><polyline data-points="5.947640350342446,3.7687318289627956 3.679703122395102,3.7687318289627956" data-type="line" data-label="" points="382.43277602256114,401.1188442095099 233.01573512250084,401.1188442095099" fill="none" stroke="rgba(255,0,0,0.5)" stroke-width="9.88235294117647"/></g><g><polyline data-points="3.679703122395102,3.7687318289627956 1,1.0890287065676938" data-type="line" data-label="" points="233.01573512250084,401.1188442095099 56.470588235294144,577.6639910967166" fill="none" stroke="rgba(255,0,0,0.5)" stroke-width="9.88235294117647"/></g><g><polyline data-points="1,1.0890287065676938 1,1" data-type="line" data-label="" points="56.470588235294144,577.6639910967166 56.470588235294144,583.5294117647059" fill="none" stroke="rgba(255,0,0,0.5)" stroke-width="9.88235294117647"/></g><g><polyline data-points="1,1 1,1" data-type="line" data-label="" points="56.470588235294144,583.5294117647059 56.470588235294144,583.5294117647059" fill="none" stroke="rgba(255,0,0,0.5)" stroke-width="9.88235294117647"/></g><g><rect data-type="rect" data-label="" data-x="5" data-y="5" x="254.11764705882354" y="254.11764705882354" width="131.76470588235293" height="131.76470588235293" fill="rgba(255,0,0,0.5)" stroke="black" stroke-width="0.01517857142857143"/></g><g><rect data-type="rect" data-label="" data-x="1" data-y="1" x="40.00000000000003" y="567.0588235294117" width="32.94117647058823" height="32.94117647058829" fill="rgba(255,0,0,0.5)" stroke="black" stroke-width="0.01517857142857143"/></g><g><rect data-type="rect" data-label="" data-x="9" data-y="9" x="567.0588235294117" y="40" width="32.94117647058829" height="32.94117647058829" fill="rgba(255,0,0,0.5)" stroke="black" stroke-width="0.01517857142857143"/></g><g><rect data-type="rect" data-label="" data-x="1" data-y="9" x="40.00000000000003" y="40" width="32.94117647058823" height="32.94117647058829" fill="rgba(255,0,0,0.5)" stroke="black" stroke-width="0.01517857142857143"/></g><g><rect data-type="rect" data-label="" data-x="9" data-y="1" x="567.0588235294117" y="567.0588235294117" width="32.94117647058829" height="32.94117647058829" fill="rgba(255,0,0,0.5)" stroke="black" stroke-width="0.01517857142857143"/></g><g><rect data-type="rect" data-label="" data-x="4" data-y="1" x="237.64705882352942" y="567.0588235294117" width="32.94117647058826" height="32.94117647058829" fill="rgba(255,0,0,0.5)" stroke="black" stroke-width="0.01517857142857143"/></g><circle data-type="circle" data-label="" data-x="2.1999999999999997" data-y="3.2" cx="135.52941176470588" cy="438.5882352941176" r="19.76470588235294" fill="blue" stroke="none" stroke-width="0.01517857142857143"/><circle data-type="circle" data-label="" data-x="2.5999999999999996" data-y="2.0000000000000004" cx="161.88235294117646" cy="517.6470588235294" r="19.76470588235294" fill="blue" stroke="none" stroke-width="0.01517857142857143"/><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":65.88235294117646,"c":0,"e":-9.41176470588232,"b":0,"d":-65.88235294117646,"f":649.4117647058823};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>