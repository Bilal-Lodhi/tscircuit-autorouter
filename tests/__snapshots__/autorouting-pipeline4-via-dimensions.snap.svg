<svg width="640" height="640" viewBox="0 0 640 640" xmlns="http://www.w3.org/2000/svg"><rect width="100%" height="100%" fill="white"/><g><polyline data-points="-5.5,0 -4.618488057120458,0" data-type="line" data-label="" points="40,320 84.87697163750397,320" fill="none" stroke="hsl(0, 100%, 50%)" stroke-width="7.636363636363636"/></g><g><polyline data-points="-4.618488057120458,0 -4.53475712845847,-0.08373092866198846" data-type="line" data-label="" points="84.87697163750397,320 89.13963709665975,324.26266545915576" fill="none" stroke="hsl(0, 100%, 50%)" stroke-width="7.636363636363636"/></g><g><polyline data-points="-4.53475712845847,-0.08373092866198846 -4.4182690713380115,-0.08373092866198846" data-type="line" data-label="" points="89.13963709665975,324.26266545915576 95.06993818642852,324.26266545915576" fill="none" stroke="hsl(0, 100%, 50%)" stroke-width="7.636363636363636"/></g><g><polyline data-points="-4.4182690713380115,-0.08373092866198846 -4.375,-0.127" data-type="line" data-label="" points="95.06993818642852,324.26266545915576 97.27272727272728,326.4654545454545" fill="none" stroke="hsl(0, 100%, 50%)" stroke-width="7.636363636363636"/></g><g><polyline data-points="-4.375,-0.127 4.299088819920018,-0.127" data-type="line" data-label="" points="97.27272727272728,326.4654545454545 538.8627035595646,326.4654545454545" fill="none" stroke="rgba(255,0,0,0.5)" stroke-width="7.636363636363636" stroke-dasharray="0.2 0.2"/></g><g><polyline data-points="4.299088819920018,-0.127 4.312157680773622,-0.14006886085360395" data-type="line" data-label="" points="538.8627035595646,326.4654545454545 539.5280273848389,327.13077837072893" fill="none" stroke="rgba(255,0,0,0.5)" stroke-width="7.636363636363636" stroke-dasharray="0.2 0.2"/></g><g><polyline data-points="4.312157680773622,-0.14006886085360395 4.361931139146396,-0.14006886085360395" data-type="line" data-label="" points="539.5280273848389,327.13077837072893 542.0619489019983,327.13077837072893" fill="none" stroke="rgba(255,0,0,0.5)" stroke-width="7.636363636363636" stroke-dasharray="0.2 0.2"/></g><g><polyline data-points="4.361931139146396,-0.14006886085360395 4.375,-0.127" data-type="line" data-label="" points="542.0619489019983,327.13077837072893 542.7272727272727,326.4654545454545" fill="none" stroke="rgba(255,0,0,0.5)" stroke-width="7.636363636363636" stroke-dasharray="0.2 0.2"/></g><g><polyline data-points="4.375,-0.127 5.373,-0.127" data-type="line" data-label="" points="542.7272727272727,326.4654545454545 593.5345454545454,326.4654545454545" fill="none" stroke="hsl(0, 100%, 50%)" stroke-width="7.636363636363636"/></g><g><polyline data-points="5.373,-0.127 5.5,0" data-type="line" data-label="" points="593.5345454545454,326.4654545454545 600,320" fill="none" stroke="hsl(0, 100%, 50%)" stroke-width="7.636363636363636"/></g><g><rect data-type="rect" data-label="top" data-x="0" data-y="0" x="154.54545454545456" y="228.36363636363637" width="330.9090909090909" height="183.27272727272725" fill="rgba(255,0,0,0.5)" stroke="black" stroke-width="0.019642857142857142"/></g><circle data-type="circle" data-label="" data-x="-4.375" data-y="-0.127" cx="97.27272727272728" cy="326.4654545454545" r="38.18181818181818" fill="blue" stroke="none" stroke-width="0.019642857142857142"/><circle data-type="circle" data-label="" data-x="4.375" data-y="-0.127" cx="542.7272727272727" cy="326.4654545454545" r="38.18181818181818" fill="blue" stroke="none" stroke-width="0.019642857142857142"/><g><circle data-type="point" data-label="net1
