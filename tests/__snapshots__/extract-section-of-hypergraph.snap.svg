oke="#2d8fff" stroke-width="0.013323529411764708"/><circle data-type="circle" data-label="" data-x="3.45" data-y="4" cx="558.7196467991171" cy="46.004415011037565" r="6.004415011037527" fill="rgba(161, 213, 255, 1)" stroke="#2d8fff" stroke-width="0.013323529411764708"/><circle data-type="circle" data-label="" data-x="4.6" data-y="4" cx="645.0331125827814" cy="46.004415011037565" r="6.004415011037527" fill="rgba(161, 213, 255, 1)" stroke="#2d8fff" stroke-width="0.013323529411764708"/><circle data-type="circle" data-label="" data-x="5.55" data-y="4" cx="716.335540838852" cy="46.004415011037565" r="6.004415011037527" fill="rgba(161, 213, 255, 1)" stroke="#2d8fff" stroke-width="0.013323529411764708"/><text data-type="text" data-label="Full graph" data-x="0" data-y="-0.45" x="299.77924944812366" y="380" fill="#2f9c38" font-size="21.015452538631344" font-family="sans-serif" text-anchor="start" dominant-baseline="text-before-edge">Full graph</text><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="420" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="1200" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '1200');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '420');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":75.05518763796908,"c":0,"e":299.77924944812366,"b":0,"d":-75.05518763796908,"f":346.2251655629139};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script>
  </g>
