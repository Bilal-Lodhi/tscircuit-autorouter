yline data-points="10.399999999999999,-0.8000000000000003 8.799999999999999,-0.8000000000000003" data-type="line" data-label="" points="327.46666666666664,521.6 297.59999999999997,521.6" fill="none" stroke="rgba(255,0,0,0.5)" stroke-width="2.8000000000000003"/></g><g><polyline data-points="8.799999999999999,-0.8000000000000003 7.199999999999999,-0.8000000000000003" data-type="line" data-label="" points="297.59999999999997,521.6 267.73333333333335,521.6" fill="none" stroke="rgba(255,0,0,0.5)" stroke-width="2.8000000000000003"/></g><g><polyline data-points="7.199999999999999,-0.8000000000000003 5.6,-0.8000000000000003" data-type="line" data-label="" points="267.73333333333335,521.6 237.86666666666665,521.6" fill="none" stroke="rgba(255,0,0,0.5)" stroke-width="2.8000000000000003"/></g><g><polyline data-points="5.6,-0.8000000000000003 4,-2.4000000000000004" data-type="line" data-label="" points="237.86666666666665,521.6 208,551.4666666666667" fill="none" stroke="rgba(255,0,0,0.5)" stroke-width="2.8000000000000003"/></g><g><polyline data-points="4,-2.4000000000000004 2.4000000000000004,-0.8" data-type="line" data-label="" points="208,551.4666666666667 178.13333333333333,521.6" fill="none" stroke="rgba(255,0,0,0.5)" stroke-width="2.8000000000000003"/></g><g><polyline data-points="2.4000000000000004,-0.8 2.45,-0.5" data-type="line" data-label="" points="178.13333333333333,521.6 179.06666666666666,516" fill="none" stroke="rgba(255,0,0,0.5)" stroke-width="2.8000000000000003"/></g><g><polyline data-points="2.45,-0.5 2.2750000000000004,0.675" data-type="line" data-label="" points="179.06666666666666,516 175.79999999999998,494.06666666666666" fill="none" stroke="rgba(255,0,0,0.5)" stroke-width="2.8000000000000003"/></g><g><polyline data-points="2.2750000000000004,0.675 1.5,0.675" data-type="line" data-label="" points="175.79999999999998,494.06666666666666 161.33333333333331,494.06666666666666" fill="none" stroke="rgba(255,0,0,0.5)" stroke-width="2.8000000000000003"/></g><g><polyline data-points="1.5,0.675 1,1" data-type="line" data-label="" points="161.33333333333331,494.06666666666666 151.99999999999997,488" fill="none" stroke="rgba(255,0,0,0.5)" stroke-width="2.8000000000000003"/></g><g><rect data-type="rect" data-label="top" data-x="0" data-y="0" x="123.99999999999999" y="497.33333333333337" width="18.66666666666667" height="18.66666666666663" fill="rgba(255,0,0,0.25)" stroke="black" stroke-width="0.05357142857142857"/></g><g><rect data-type="rect" data-label="top" data-x="20" data-y="0" x="497.3333333333333" y="497.33333333333337" width="18.666666666666686" height="18.66666666666663" fill="rgba(255,0,0,0.25)" stroke="black" stroke-width="0.05357142857142857"/></g><g><rect data-type="rect" data-label="top" data-x="1" data-y="1" x="142.66666666666666" y="478.6666666666667" width="18.666666666666657" height="18.666666666666686" fill="rgba(255,0,0,0.25)" stroke="black" stroke-width="0.05357142857142857"/></g><g><rect data-type="rect" data-label="top" data-x="19" data-y="1" x="478.6666666666667" y="478.6666666666667" width="18.66666666666663" height="18.666666666666686" fill="rgba(255,0,0,0.25)" stroke="black" stroke-width="0.05357142857142857"/></g><g><rect data-type="rect" data-label="" data-x="0" data-y="0" x="123.99999999999999" y="497.33333333333337" width="18.66666666666667" height="18.66666666666663" fill="rgba(255,0,0,0.5)" stroke="black" stroke-width="0.05357142857142857"/></g><g><rect data-type="rect" data-label="" data-x="20" data-y="0" x="497.3333333333333" y="497.33333333333337" width="18.666666666666686" height="18.66666666666663" fill="rgba(255,0,0,0.5)" stroke="black" stroke-width="0.05357142857142857"/></g><g><rect data-type="rect" data-label="" data-x="1" data-y="1" x="142.66666666666666" y="478.6666666666667" width="18.666666666666657" height="18.666666666666686" fill="rgba(255,0,0,0.5)" stroke="black" stroke-width="0.05357142857142857"/></g><g><rect data-type="rect" data-label="" data-x="19" data-y="1" x="478.6666666666667" y="478.6666666666667" width="18.66666666666663" height="18.666666666666686" fill="rgba(255,0,0,0.5)" stroke="black" stroke-width="0.05357142857142857"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":18.666666666666668,"c":0,"e":133.33333333333331,"b":0,"d":-18.666666666666668,"f":506.6666666666667};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>