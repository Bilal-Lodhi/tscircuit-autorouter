a-label="" data-x="-5.5" data-y="0" x="90" y="310" width="20" height="20" fill="rgba(255,0,0,0.5)" stroke="black" stroke-width="0.025"/></g><g><rect data-type="rect" data-label="" data-x="-5.5" data-y="1" x="90" y="270" width="20" height="20" fill="rgba(255,0,0,0.5)" stroke="black" stroke-width="0.025"/></g><g><rect data-type="rect" data-label="" data-x="-5.5" data-y="2" x="90" y="230" width="20" height="20" fill="rgba(255,0,0,0.5)" stroke="black" stroke-width="0.025"/></g><g><rect data-type="rect" data-label="" data-x="2" data-y="0" x="390" y="310" width="20" height="20" fill="rgba(255,0,0,0.5)" stroke="black" stroke-width="0.025"/></g><g><rect data-type="rect" data-label="" data-x="3" data-y="0" x="430" y="310" width="20" height="20" fill="rgba(255,0,0,0.5)" stroke="black" stroke-width="0.025"/></g><g><rect data-type="rect" data-label="" data-x="4" data-y="0" x="470" y="310" width="20" height="20" fill="rgba(255,0,0,0.5)" stroke="black" stroke-width="0.025"/></g><g><rect data-type="rect" data-label="" data-x="5" data-y="0" x="510" y="310" width="20" height="20" fill="rgba(255,0,0,0.5)" stroke="black" stroke-width="0.025"/></g><circle data-type="circle" data-label="" data-x="0.5999999999999999" data-y="-0.19999999999999996" cx="344" cy="328" r="12" fill="blue" stroke="none" stroke-width="0.025"/><circle data-type="circle" data-label="" data-x="2.4000000000000004" data-y="-1.2000000000000002" cx="416" cy="368" r="12" fill="blue" stroke="none" stroke-width="0.025"/><circle data-type="circle" data-label="" data-x="-2.4" data-y="2" cx="224" cy="240" r="12" fill="blue" stroke="none" stroke-width="0.025"/><circle data-type="circle" data-label="" data-x="6" data-y="-1.2000000000000002" cx="560" cy="368" r="12" fill="blue" stroke="none" stroke-width="0.025"/><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":40,"c":0,"e":320,"b":0,"d":-40,"f":320};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>