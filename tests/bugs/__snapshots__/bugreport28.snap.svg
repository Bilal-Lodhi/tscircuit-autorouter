1.8936447520927926,-0.1947975137726227" data-type="line" data-label="" points="491.5,443.93227732703525 373.0220530585982,325.45433038563345" fill="none" stroke="rgba(0,0,255,0.5)" stroke-width="4.2"/></g><g><polyline data-points="1.8936447520927926,-0.1947975137726227 1.7999999999999998,-0.20000000000000007" data-type="line" data-label="" points="373.0220530585982,325.45433038563345 370.4,325.6" fill="none" stroke="rgba(0,0,255,0.5)" stroke-width="4.2"/></g><g><polyline data-points="1.7999999999999998,-0.20000000000000007 -2.8,-0.20000000000000007" data-type="line" data-label="" points="370.4,325.6 241.60000000000002,325.6" fill="none" stroke="rgba(255,0,0,0.5)" stroke-width="4.2"/></g><g><polyline data-points="-2.8,-0.20000000000000007 -3,0" data-type="line" data-label="" points="241.60000000000002,325.6 236,320" fill="none" stroke="rgba(255,0,0,0.5)" stroke-width="4.2"/></g><g><rect data-type="rect" data-label="top" data-x="-3" data-y="0" x="215" y="299" width="42" height="42" fill="rgba(255,0,0,0.25)" stroke="black" stroke-width="0.03571428571428571"/></g><g><rect data-type="rect" data-label="top" data-x="3" data-y="0" x="383" y="299" width="42" height="42" fill="rgba(255,0,0,0.25)" stroke="black" stroke-width="0.03571428571428571"/></g><g><rect data-type="rect" data-label="top" data-x="0" data-y="3" x="299" y="215" width="42" height="42" fill="rgba(255,0,0,0.25)" stroke="black" stroke-width="0.03571428571428571"/></g><g><rect data-type="rect" data-label="top" data-x="0" data-y="-3" x="299" y="383" width="42" height="42" fill="rgba(255,0,0,0.25)" stroke="black" stroke-width="0.03571428571428571"/></g><g><rect data-type="rect" data-label="" data-x="-3" data-y="0" x="215" y="299" width="42" height="42" fill="rgba(255,0,0,0.5)" stroke="black" stroke-width="0.03571428571428571"/></g><g><rect data-type="rect" data-label="" data-x="3" data-y="0" x="383" y="299" width="42" height="42" fill="rgba(255,0,0,0.5)" stroke="black" stroke-width="0.03571428571428571"/></g><g><rect data-type="rect" data-label="" data-x="0" data-y="3" x="299" y="215" width="42" height="42" fill="rgba(255,0,0,0.5)" stroke="black" stroke-width="0.03571428571428571"/></g><g><rect data-type="rect" data-label="" data-x="0" data-y="-3" x="299" y="383" width="42" height="42" fill="rgba(255,0,0,0.5)" stroke="black" stroke-width="0.03571428571428571"/></g><circle data-type="circle" data-label="" data-x="-0.2" data-y="-1.7999999999999998" cx="314.4" cy="370.4" r="8.4" fill="blue" stroke="none" stroke-width="0.03571428571428571"/><circle data-type="circle" data-label="" data-x="-0.2" data-y="1.8000000000000003" cx="314.4" cy="269.6" r="8.4" fill="blue" stroke="none" stroke-width="0.03571428571428571"/><circle data-type="circle" data-label="" data-x="6.125" data-y="-5.375" cx="491.5" cy="470.5" r="8.4" fill="blue" stroke="none" stroke-width="0.03571428571428571"/><circle data-type="circle" data-label="" data-x="1.7999999999999998" data-y="-0.20000000000000007" cx="370.4" cy="325.6" r="8.4" fill="blue" stroke="none" stroke-width="0.03571428571428571"/><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":28,"c":0,"e":320,"b":0,"d":-28,"f":320};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>