<svg width="640" height="640" viewBox="0 0 640 640" xmlns="http://www.w3.org/2000/svg"><rect width="100%" height="100%" fill="white"/><g><circle data-type="point" data-label="source_trace_0 pcb_port_3" data-x="4.49" data-y="0" cx="445.72" cy="320" r="3" fill="black"/></g><g><circle data-type="point" data-label="source_trace_0 pcb_port_2" data-x="-0.51" data-y="0" cx="305.72" cy="320" r="3" fill="black"/></g><g><circle data-type="point" data-label="source_trace_0 (top)" data-x="4.49" data-y="0" cx="445.72" cy="320" r="3" fill="hsl(0, 100%, 50%)"/></g><g><circle data-type="point" data-label="source_trace_0 (top)" data-x="-0.51" data-y="0" cx="305.72" cy="320" r="3" fill="hsl(0, 100%, 50%)"/></g><g><polyline data-points="-10,-10 10,-10 10,10 -10,10 -10,-10" data-type="line" data-label="" points="40,600 600,600 600,40 40,40 40,600" fill="none" stroke="rgba(255,0,0,0.25)" stroke-width="1px"/></g><g><polyline data-points="4.49,0 2.5950350542254244,0" data-type="line" data-label="" points="445.72,320 392.66098151831187,320" fill="none" stroke="rgba(255,0,0,0.5)" stroke-width="4.2"/></g><g><polyline data-points="2.5950350542254244,0 2.52252437543491,-0.07251067879051429" data-type="line" data-label="" points="392.66098151831187,320 390.6306825121775,322.0302990061344" fill="none" stroke="rgba(255,0,0,0.5)" stroke-width="4.2"/></g><g><polyline data-points="2.52252437543491,-0.07251067879051429 2.5,-0.06999999999999884" data-type="line" data-label="" points="390.6306825121775,322.0302990061344 390,321.96" fill="none" stroke="rgba(255,0,0,0.5)" stroke-width="4.2"/></g><g><polyline data-points="2.5,-0.06999999999999884 0.4411883486669108,-0.06999999999999884" data-type="line" data-label="" points="390,321.96 332.3532737626735,321.96" fill="none" stroke="rgba(0,0,255,0.5)" stroke-width="4.2"/></g><g><polyline data-points="0.4411883486669108,-0.06999999999999884 -0.22373470225627534,-0.734923050923185" data-type="line" data-label="" points="332.3532737626735,321.96 313.73542833682427,340.5778454258492" fill="none" stroke="rgba(0,0,255,0.5)" stroke-width="4.2"/></g><g><polyline data-points="-0.22373470225627534,-0.734923050923185 -0.3524999999999999,-0.8699999999999989" data-type="line" data-label="" points="313.73542833682427,340.5778454258492 310.13,344.35999999999996" fill="none" stroke="rgba(0,0,255,0.5)" stroke-width="4.2"/></g><g><polyline data-points="-0.3524999999999999,-0.8699999999999989 -0.3524999999999999,-0.15750000000000008" data-type="line" data-label="" points="310.13,344.35999999999996 310.13,324.41" fill="none" stroke="rgba(255,0,0,0.5)" stroke-width="4.2"/></g><g><polyline data-points="-0.3524999999999999,-0.15750000000000008 -0.51,0" data-type="line" data-label="" points="310.13,324.41 305.72,320" fill="none" stroke="rgba(255,0,0,0.5)" stroke-width="4.2"/></g><g><rect data-type="rect" data-label="top" data-x="-0.51" data-y="0" x="298.16" y="311.04" width="15.119999999999948" height="17.91999999999996" fill="rgba(255,0,0,0.25)" stroke="black" stroke-width="0.03571428571428571"/></g><g><rect data-type="rect" data-label="top" data-x="0.51" data-y="0" x="326.72" y="311.04" width="15.119999999999948" height="17.91999999999996" fill="rgba(255,0,0,0.25)" stroke="black" stroke-width="0.03571428571428571"/></g><g><rect data-type="rect" data-label="top" data-x="4.49" data-y="0" x="438.16" y="311.04" width="15.119999999999948" height="17.91999999999996" fill="rgba(255,0,0,0.25)" stroke="black" stroke-width="0.03571428571428571"/></g><g><rect data-type="rect" data-label="top" data-x="5.51" data-y="0" x="466.72" y="311.04" width="15.119999999999948" height="17.91999999999996" fill="rgba(255,0,0,0.25)" stroke="black" stroke-width="0.03571428571428571"/></g><g><rect data-type="rect" data-label="" data-x="-0.51" data-y="0" x="298.16" y="311.04" width="15.119999999999948" height="17.91999999999996" fill="rgba(255,0,0,0.5)" stroke="black" stroke-width="0.03571428571428571"/></g><g><rect data-type="rect" data-label="" data-x="0.51" data-y="0" x="326.72" y="311.04" width="15.119999999999948" height="17.91999999999996" fill="rgba(255,0,0,0.5)" stroke="black" stroke-width="0.03571428571428571"/></g><g><rect data-type="rect" data-label="" data-x="4.49" data-y="0" x="438.16" y="311.04" width="15.119999999999948" height="17.91999999999996" fill="rgba(255,0,0,0.5)" stroke="black" stroke-width="0.03571428571428571"/></g><g><rect data-type="rect" data-label="" data-x="5.51" data-y="0" x="466.72" y="311.04" width="15.119999999999948" height="17.91999999999996" fill="rgba(255,0,0,0.5)" stroke="black" stroke-width="0.03571428571428571"/></g><circle data-type="circle" data-label="" data-x="2.5" data-y="-0.06999999999999884" cx="390" cy="321.96" r="8.4" fill="blue" stroke="none" stroke-width="0.03571428571428571"/><circle data-type="circle" data-label="" data-x="-0.3524999999999999" data-y="-0.8699999999999989" cx="310.13" cy="344.35999999999996" r="8.4" fill="blue" stroke="none" stroke-width="0.03571428571428571"/><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":28,"c":0,"e":320,"b":0,"d":-28,"f":320};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>