idth="0.04285714285714286"/></g><g><rect data-type="rect" data-label="top" data-x="2" data-y="0" x="355" y="308.3333333333333" width="23.333333333333314" height="23.33333333333337" fill="rgba(255,0,0,0.25)" stroke="black" stroke-width="0.04285714285714286"/></g><g><rect data-type="rect" data-label="top" data-x="6" data-y="0" x="448.3333333333333" y="308.3333333333333" width="23.333333333333314" height="23.33333333333337" fill="rgba(255,0,0,0.25)" stroke="black" stroke-width="0.04285714285714286"/></g><g><rect data-type="rect" data-label="" data-x="-6" data-y="0" x="168.33333333333334" y="308.3333333333333" width="23.333333333333343" height="23.33333333333337" fill="rgba(255,0,0,0.5)" stroke="black" stroke-width="0.04285714285714286"/></g><g><rect data-type="rect" data-label="" data-x="-2" data-y="0" x="261.6666666666667" y="308.3333333333333" width="23.333333333333314" height="23.33333333333337" fill="rgba(255,0,0,0.5)" stroke="black" stroke-width="0.04285714285714286"/></g><g><rect data-type="rect" data-label="" data-x="2" data-y="0" x="355" y="308.3333333333333" width="23.333333333333314" height="23.33333333333337" fill="rgba(255,0,0,0.5)" stroke="black" stroke-width="0.04285714285714286"/></g><g><rect data-type="rect" data-label="" data-x="6" data-y="0" x="448.3333333333333" y="308.3333333333333" width="23.333333333333314" height="23.33333333333337" fill="rgba(255,0,0,0.5)" stroke="black" stroke-width="0.04285714285714286"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":23.333333333333332,"c":0,"e":320,"b":0,"d":-23.333333333333332,"f":320};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>