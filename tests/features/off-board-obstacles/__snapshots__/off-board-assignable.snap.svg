,0,0,0.5)" stroke-width="3.4999999999999996"/></g><g><polyline data-points="3.7721174397048074,-0.09579834847959603 3.5233646743439975,-0.07086587871827264" data-type="line" data-label="" points="408.0160735931122,322.23529479785725 402.21184240135995,321.65353717009305" fill="none" stroke="rgba(255,0,0,0.5)" stroke-width="3.4999999999999996"/></g><g><polyline data-points="3.5233646743439975,-0.07086587871827264 3.025122402778785,-0.028977469515516725" data-type="line" data-label="" points="402.21184240135995,321.65353717009305 390.58618939817165,320.67614095536203" fill="none" stroke="rgba(255,0,0,0.5)" stroke-width="3.4999999999999996"/></g><g><polyline data-points="3.025122402778785,-0.028977469515516725 2.775755094008698,-0.012092856555233629" data-type="line" data-label="" points="390.58618939817165,320.67614095536203 384.76761886020296,320.2821666529554" fill="none" stroke="rgba(255,0,0,0.5)" stroke-width="3.4999999999999996"/></g><g><polyline data-points="2.775755094008698,-0.012092856555233629 2.2758288600626693,-0.003504456672779951" data-type="line" data-label="" points="384.76761886020296,320.2821666529554 373.1026734014623,320.0817706556982" fill="none" stroke="rgba(255,0,0,0.5)" stroke-width="3.4999999999999996"/></g><g><polyline data-points="2.2758288600626693,-0.003504456672779951 2.025852230844285,-0.0002008194931222768" data-type="line" data-label="" points="373.1026734014623,320.0817706556982 367.26988538636664,320.0046857881729" fill="none" stroke="rgba(255,0,0,0.5)" stroke-width="3.4999999999999996"/></g><g><polyline data-points="2.025852230844285,-0.0002008194931222768 2,0" data-type="line" data-label="" points="367.26988538636664,320.0046857881729 366.6666666666667,320" fill="none" stroke="rgba(255,0,0,0.5)" stroke-width="3.4999999999999996"/></g><g><rect data-type="rect" data-label="obstacle
