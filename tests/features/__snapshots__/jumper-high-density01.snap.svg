/g><g><rect data-type="rect" data-label="" data-x="-9.144999999999998" data-y="-16.93" x="310.2439024390245" y="580.4878048780489" width="19.51219512195098" height="19.51219512195121" fill="rgba(255, 100, 255, 0.6)" stroke="black" stroke-width="0.015374999999999991"/></g><g><rect data-type="rect" data-label="" data-x="-9.144999999999998" data-y="-8.620000000000001" x="310.2439024390245" y="40" width="19.51219512195098" height="19.512195121951095" fill="rgba(255, 100, 255, 0.6)" stroke="black" stroke-width="0.015374999999999991"/></g><g><rect data-type="rect" data-label="" data-x="-10.769999999999998" data-y="-16.93" x="204.55284552845535" y="580.4878048780489" width="19.51219512195098" height="19.51219512195121" fill="rgba(255, 100, 255, 0.6)" stroke="black" stroke-width="0.015374999999999991"/></g><g><rect data-type="rect" data-label="" data-x="-9.957499999999998" data-y="-8.620000000000001" x="257.39837398373993" y="40" width="19.51219512195098" height="19.512195121951095" fill="rgba(255, 100, 255, 0.6)" stroke="black" stroke-width="0.015374999999999991"/></g><g><rect data-type="rect" data-label="" data-x="-11.853333333333332" data-y="-16.93" x="134.09214092140917" y="580.4878048780489" width="19.512195121951095" height="19.51219512195121" fill="rgba(255, 100, 255, 0.6)" stroke="black" stroke-width="0.015374999999999991"/></g><g><rect data-type="rect" data-label="" data-x="-6.978333333333332" data-y="-16.93" x="451.16531165311653" y="580.4878048780489" width="19.512195121951322" height="19.51219512195121" fill="rgba(255, 100, 255, 0.6)" stroke="black" stroke-width="0.015374999999999991"/></g><g><rect data-type="rect" data-label="" data-x="-8.332499999999998" data-y="-8.620000000000001" x="363.0894308943091" y="40" width="19.51219512195098" height="19.512195121951095" fill="rgba(255, 100, 255, 0.6)" stroke="black" stroke-width="0.015374999999999991"/></g><g><rect data-type="rect" data-label="" data-x="-8.061666666666664" data-y="-16.93" x="380.7046070460706" y="580.4878048780489" width="19.51219512195121" height="19.51219512195121" fill="rgba(255, 100, 255, 0.6)" stroke="black" stroke-width="0.015374999999999991"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":65.0406504065041,"c":0,"e":914.7967479674799,"b":0,"d":-65.0406504065041,"f":-510.89430894308987};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>