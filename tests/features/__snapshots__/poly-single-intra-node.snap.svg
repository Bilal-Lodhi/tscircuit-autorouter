e data-type="point" data-label="a projected" data-x="5.141789416530459" data-y="3.2659690854665673" cx="519.9003455428428" cy="198.67642106111947" r="3" fill="rgba(255, 120, 0, 0.85)"/></g><g><circle data-type="point" data-label="b projected" data-x="5.141789416530459" data-y="0.6958217856300155" cx="519.9003455428428" cy="438.556835712531" r="3" fill="rgba(255, 120, 0, 0.85)"/></g><g><circle data-type="point" data-label="b projected" data-x="0.8582105834695404" data-y="3.2659690854665673" cx="120.0996544571571" cy="198.67642106111947" r="3" fill="rgba(255, 120, 0, 0.85)"/></g><g><circle data-type="point" data-label="a
