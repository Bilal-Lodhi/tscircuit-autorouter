3232147354,2.1864559168660063 9.422952498595736,2.078395971552104 9.41416023011469,1.971652853612745 9.405474456065003,1.866202638372045 9.396893253257973,1.7620219772301478 9.38841474453576,1.6590880804279875 9.380037097402425,1.5573787004271624 9.371758522703505,1.4568721158794413 9.363577273352192,1.3575471161616508 9.355491643100143,1.2593829864528088 9.347499965351172,1.1623594933314598 9.33960061201602,1.0664568708721673 9.33179199240663,0.9716558072211116 9.324072552168259,0.8779374316316219 9.316440772248011,0.785283301941383 9.30889516789829,0.6936753924738479 9,1" data-type="line" data-label="net2" points="563.2344871134459,378.16056335478277 578.3832532542231,386.10861610298775 585.6653201703249,394.272539488627 592.8704986332999,402.35026324883 600,410.3431454354593 599.3283914859087,418.49685309159435 598.6655551929061,426.5440610164893 598.011320368459,434.4868422425789 597.365520663096,442.3272163466427 596.7279939893925,450.06715116179294 596.0985823863433,457.7085644240857 595.4771318888778,465.2533253566514 594.8634924023002,472.70325619409175 594.2575175814306,480.06013364975576 593.6590647142493,487.3256903283759 593.0679946098454,494.50161608642344 592.4841714904887,501.58955934242687 591.9074628876465,508.5911283393873 591.3377395417775,515.507892361322 590.7748753057482,522.3413829058678 590.2187470517129,529.0930948147869 589.6692345813206,535.7644873641258 589.1262205391046,542.3569853156985 588.5895903289294,548.871979931485 588.0592320333642,555.3108299524623 587.5350363358704,561.6748625433144 587.0168964456823,567.9653742044001 586.5047080252801,574.1836316522965 585.998369120344,580.330872670173 585.4977800920979,586.4083069291954 585.0028435519422,592.4171167821045 564.7415763843837,572.3244596022794" fill="none" stroke="hsl(0, 100%, 50%)" stroke-width="9.838904557207195"/></g><g><polyline data-points="3.8597348207803925,3.600187527441989 6.2038995238635435,3.605877790934859" data-type="line" data-label="net1" points="227.57771973720205,401.77114684666407 381.3378049372625,401.39790711725266" fill="none" stroke="hsl(150, 100%, 50%)" stroke-width="9.838904557207195"/></g><g><polyline data-points="1,1 3.8597348207803925,3.600187527441989" data-type="line" data-label="net1" points="40,572.3244596022794 227.57771973720205,401.77114684666407" fill="none" stroke="hsl(150, 100%, 50%)" stroke-width="9.838904557207195"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":65.59269704804797,"c":0,"e":-25.592697048047967,"b":0,"d":-65.59269704804797,"f":637.9171566503273};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>