5,1.8540871812915687 8.94365707069635,1.7529907391008397 8.964313181715234,1.652035917580906 8.98494037693157,1.5512224193566693 9.00553871702029,1.4505499478850212 9.0261082624867,1.3500182074519327 9.046649073667053,1.249626903169562 9.067161210729152,1.1493757409733691 9.087644733672935,1.0492644276192455 9.108099702331057,0.9492926706806543 9.128526176369473,0.8494601785457827 9,1" data-type="line" data-label="net2" points="585.2798613558525,389.09977732154243 583.0671969586424,401.42192054806867 577.7800076660074,409.7364591172271 572.4686441889971,418.08901357294485 567.1329403532413,426.47984523804075 561.7727284578193,434.9092178359596 563.2030931979402,441.8999924747724 564.6314343726378,448.88087712577726 566.0577562730443,455.85189276148276 567.4820631781672,462.81306029514053 568.9043593549325,469.76440058095477 570.3246490582271,476.7059344142906 571.742936530942,483.63768253188096 573.1592260040134,490.55966561203377 574.5735216964651,497.471904274837 575.9858278154513,504.3744190823636 577.396148556297,511.26723053887554 578.8044881025405,518.1503590910268 580.2108506259744,525.0238251280649 581.6152402866867,531.8876489820336 583.0176612331018,538.7418509279721 584.4181176020218,545.5864511841149 585.8166135186666,552.4214699120914 587.2131530967147,559.2469272171229 588.6077404383439,566.0628431482203 590.0003796342705,572.8692376983801 591.3910747637899,579.6661308047801 592.7798298948169,586.453542348974 594.1666490839245,593.2314921570853 595.5515363763836,600 586.8376355794232,589.793603861884" fill="none" stroke="hsl(0, 100%, 50%)" stroke-width="10.169796974171378"/></g><g><polyline data-points="3.8597348207803925,3.600187527441989 6.2038995238635435,3.605877790934859" data-type="line" data-label="net1" points="238.33461380564944,413.50440886949934 397.26580783481194,413.1186167064858" fill="none" stroke="hsl(150, 100%, 50%)" stroke-width="10.169796974171378"/></g><g><polyline data-points="1,1 3.8597348207803925,3.600187527441989" data-type="line" data-label="net1" points="44.448463623616306,589.793603861884 238.33461380564944,413.50440886949934" fill="none" stroke="hsl(150, 100%, 50%)" stroke-width="10.169796974171378"/></g><circle data-type="circle" data-label="" data-x="6.704851430887342" data-y="4.630011912803146" cx="431.229669089852" cy="343.6837094150074" r="10.169796974171378" fill="hsl(0, 100%, 50%)" stroke="black" stroke-width="0.014749556985351893"/><circle data-type="circle" data-label="" data-x="8.762682183354311" data-y="4.611008688501969" cx="570.7478088218213" cy="344.9721023016581" r="10.169796974171378" fill="hsl(0, 100%, 50%)" stroke="black" stroke-width="0.014749556985351893"/><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":67.79864649447586,"c":0,"e":-23.350182870859555,"b":0,"d":-67.79864649447586,"f":657.5922503563598};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>