><polyline data-points="2.8070149520101264,0.644428029397472 2.8070149520101273,1.0303981253772176 3.1929850479898727,1.416368221356963 3.1929850479898723,1.8023383173367087 3.1929850479898723,2.1883084133164545 3.1929850479898727,2.5742785092962004" data-type="line" data-label="a" points="301.9880621876118,446.5200505895692 301.9880621876119,410.496174964793 338.0119378123881,374.4722993400168 338.01193781238806,338.4484237152405 338.01193781238806,302.4245480904642 338.0119378123881,266.40067246568793" fill="none" stroke="rgba(0,0,255,0.5)" stroke-width="9.333333333333334" stroke-dasharray="0.1 0.3"/></g><g><polyline data-points="3.1929850479898727,2.5742785092962004 3.578955143969619,2.5742785092962004 3.964925239949365,2.5742785092962004 4.350895335929111,2.5742785092962004 4.736865431908857,2.960248605275947 5.5,3.5" data-type="line" data-label="a" points="338.0119378123881,266.40067246568793 374.03581343716445,266.40067246568793 410.0596890619407,266.40067246568793 446.08356468671695,266.40067246568793 482.1074403114933,230.3767968409116 553.3333333333333,180" fill="none" stroke="#0000ff" stroke-width="9.333333333333334"/></g><g><polygon data-type="polygon" data-label="poly-node-1 polygon" data-points="0,0 6,0 5,4 1,4" points="40,506.66666666666663 600,506.66666666666663 506.66666666666663,133.33333333333331 133.33333333333331,133.33333333333331" fill="rgba(40, 140, 220, 0.06)" stroke="rgba(20, 70, 160, 0.65)" stroke-width="0.010714285714285714"/></g><g><polygon data-type="polygon" data-label="poly-node-1 projection target" data-points="0.9333333333333385,2.220446049250313e-16 5.066666666666661,2.220446049250313e-16 5.0666666666666655,3.733333333333337 0.9333333333333345,3.733333333333337" points="127.11111111111158,506.66666666666663 512.8888888888883,506.66666666666663 512.8888888888887,158.2222222222219 127.11111111111121,158.2222222222219" fill="rgba(255, 165, 0, 0.05)" stroke="rgba(255, 120, 0, 0.45)" stroke-width="0.010714285714285714"/></g><circle data-type="circle" data-label="" data-x="2.8070149520101264" data-y="0.644428029397472" cx="301.9880621876118" cy="446.5200505895692" r="13.999999999999998" fill="#0000ff" stroke="black" stroke-width="0.010714285714285714"/><circle data-type="circle" data-label="" data-x="3.1929850479898727" data-y="2.5742785092962004" cx="338.0119378123881" cy="266.40067246568793" r="13.999999999999998" fill="#0000ff" stroke="black" stroke-width="0.010714285714285714"/><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":93.33333333333333,"c":0,"e":40,"b":0,"d":-93.33333333333333,"f":506.66666666666663};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>