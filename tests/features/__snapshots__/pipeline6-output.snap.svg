<svg width="640" height="640" viewBox="0 0 640 640" xmlns="http://www.w3.org/2000/svg"><rect width="100%" height="100%" fill="white"/><g><polyline data-points="1,9 3.3126526582279077,9" data-type="line" data-label="" points="40,40 201.88568607595354,40" fill="none" stroke="hsl(170, 100%, 50%)" stroke-width="10.5"/></g><g><polyline data-points="3.3126526582279077,9 6.803814031663677,5.508838626564231" data-type="line" data-label="" points="201.88568607595354,40 446.2669822164574,284.3812961405039" fill="none" stroke="hsl(170, 100%, 50%)" stroke-width="10.5"/></g><g><polyline data-points="6.803814031663677,5.508838626564231 6.803814031663677,4.8344174205639145" data-type="line" data-label="" points="446.2669822164574,284.3812961405039 446.2669822164574,331.59078056052596" fill="none" stroke="hsl(170, 100%, 50%)" stroke-width="10.5"/></g><g><polyline data-points="6.803814031663677,4.8344174205639145 6.75928776971307,4.789891158613307" data-type="line" data-label="" points="446.2669822164574,331.59078056052596 443.1501438799149,334.70761889706847" fill="none" stroke="hsl(170, 100%, 50%)" stroke-width="10.5"/></g><g><polyline data-points="6.75928776971307,4.789891158613307 6.75928776971307,4.684448251628873" data-type="line" data-label="" points="443.1501438799149,334.70761889706847 443.1501438799149,342.0886223859789" fill="none" stroke="hsl(170, 100%, 50%)" stroke-width="10.5"/></g><g><polyline data-points="6.75928776971307,4.684448251628873 6.704851430887342,4.630011912803146" data-type="line" data-label="" points="443.1501438799149,342.0886223859789 439.339600162114,345.8991661037798" fill="none" stroke="hsl(170, 100%, 50%)" stroke-width="10.5"/></g><g><polyline data-points="6.704851430887342,4.630011912803146 8.187607607561153,4.630011912803146" data-type="line" data-label="" points="439.339600162114,345.8991661037798 543.1325325292808,345.8991661037798" fill="none" stroke="rgba(0,255,213,0.5)" stroke-width="10.5" stroke-dasharray="0.2 0.2"/></g><g><polyline data-points="8.187607607561153,4.630011912803146 8.198845857948625,4.618773662415674" data-type="line" data-label="" points="543.1325325292808,345.8991661037798 543.9192100564037,346.6858436309028" fill="none" stroke="rgba(0,255,213,0.5)" stroke-width="10.5" stroke-dasharray="0.2 0.2"/></g><g><polyline data-points="8.198845857948625,4.618773662415674 8.359516636133549,4.618773662415674" data-type="line" data-label="" points="543.9192100564037,346.6858436309028 555.1661645293484,346.6858436309028" fill="none" stroke="rgba(0,255,213,0.5)" stroke-width="10.5" stroke-dasharray="0.2 0.2"/></g><g><polyline data-points="8.359516636133549,4.618773662415674 8.363596214554224,4.6146940839949995" data-type="line" data-label="" points="555.1661645293484,346.6858436309028 555.4517350187957,346.97141412035006" fill="none" stroke="rgba(0,255,213,0.5)" stroke-width="10.5" stroke-dasharray="0.2 0.2"/></g><g><polyline data-points="8.363596214554224,4.6146940839949995 8.363596214554224,1.6364037854457756" data-type="line" data-label="" points="555.4517350187957,346.97141412035006 555.4517350187957,555.4517350187957" fill="none" stroke="hsl(170, 100%, 50%)" stroke-width="10.5"/></g><g><polyline data-points="8.363596214554224,1.6364037854457756 9,1" data-type="line" data-label="" points="555.4517350187957,555.4517350187957 600,600" fill="none" stroke="hsl(170, 100%, 50%)" stroke-width="10.5"/></g><g><polyline data-points="1,1 3.58162938129282,1" data-type="line" data-label="" points="40,600 220.7140566904974,600" fill="none" stroke="hsl(0, 100%, 50%)" stroke-width="10.5"/></g><g><polyline data-points="3.58162938129282,1 7.943257211293215,5.361627830000395" data-type="line" data-label="" points="220.7140566904974,600 526.0280047905251,294.68605189997237" fill="none" stroke="hsl(0, 100%, 50%)" stroke-width="10.5"/></g><g><polyline data-points="7.943257211293215,5.361627830000395 7.943257211293215,7.943257211293215" data-type="line" data-label="" points="526.0280047905251,294.68605189997237 526.0